<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Магазин</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-links a {
            margin: 0 15px;
            text-decoration: none;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
        }

        .nav-links a:hover {
            background: orange;
        }

        h1 {
            text-align: center;
        }

        .products {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product {
            border: 1px solid #ddd;
            padding: 15px;
            width: 220px;
            border-radius: 10px;
            background: white;
            text-align: center;
            cursor: pointer;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .price {
            color: red;
            font-size: 20px;
            font-weight: bold;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            cursor: pointer;
            border: none;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="nav-links">
        <a href="index.html">🏠 Главная</a>
        <a href="cart.html">🛒 Корзина</a>
        <a href="info.html">ℹ️ Информация</a>
        <a href="reviews.html">⭐ Отзывы</a>
    </div>

    <h1>🛒 Наш магазин</h1>

    <div class="products">
        <!-- Товар 1 -->
        <div class="product" onclick="showDetails(1)">
            <img src="https://via.placeholder.com/200x150/ff9999?text=1">
            <h3>Товар 1</h3>
            <p class="price">1000 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 1', 1000)">В корзину</button>
        </div>
        <!-- Товар 2 -->
        <div class="product" onclick="showDetails(2)">
            <img src="https://via.placeholder.com/200x150/99ff99?text=2">
            <h3>Товар 2</h3>
            <p class="price">1500 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 2', 1500)">В корзину</button>
        </div>
        <!-- Товар 3 -->
        <div class="product" onclick="showDetails(3)">
            <img src="https://via.placeholder.com/200x150/9999ff?text=3">
            <h3>Товар 3</h3>
            <p class="price">800 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 3', 800)">В корзину</button>
        </div>
        <!-- Товар 4 -->
        <div class="product" onclick="showDetails(4)">
            <img src="https://via.placeholder.com/200x150/ffff99?text=4">
            <h3>Товар 4</h3>
            <p class="price">2000 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 4', 2000)">В корзину</button>
        </div>
        <!-- Товар 5 -->
        <div class="product" onclick="showDetails(5)">
            <img src="https://via.placeholder.com/200x150/ff99ff?text=5">
            <h3>Товар 5</h3>
            <p class="price">1200 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 5', 1200)">В корзину</button>
        </div>
        <!-- Товар 6 -->
        <div class="product" onclick="showDetails(6)">
            <img src="https://via.placeholder.com/200x150/99ffff?text=6">
            <h3>Товар 6</h3>
            <p class="price">3000 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 6', 3000)">В корзину</button>
        </div>
        <!-- Товар 7 -->
        <div class="product" onclick="showDetails(7)">
            <img src="https://via.placeholder.com/200x150/ffcc99?text=7">
            <h3>Товар 7</h3>
            <p class="price">500 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 7', 500)">В корзину</button>
        </div>
        <!-- Товар 8 -->
        <div class="product" onclick="showDetails(8)">
            <img src="https://via.placeholder.com/200x150/99ccff?text=8">
            <h3>Товар 8</h3>
            <p class="price">4500 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 8', 4500)">В корзину</button>
        </div>
        <!-- Товар 9 -->
        <div class="product" onclick="showDetails(9)">
            <img src="https://via.placeholder.com/200x150/ffccff?text=9">
            <h3>Товар 9</h3>
            <p class="price">2500 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 9', 2500)">В корзину</button>
        </div>
        <!-- Товар 10 -->
        <div class="product" onclick="showDetails(10)">
            <img src="https://via.placeholder.com/200x150/ccffcc?text=10">
            <h3>Товар 10</h3>
            <p class="price">1800 ₽</p>
            <button onclick="event.stopPropagation(); addToCart('Товар 10', 1800)">В корзину</button>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="">
            <h2 id="modalTitle"></h2>
            <p class="price" id="modalPrice"></p>
            <p id="modalDesc"></p>
            <button onclick="addFromModal()">В корзину</button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function addToCart(name, price) {
            cart.push({ name: name, price: price });
            saveCart();
            alert(`✅ ${name} добавлен в корзину!\nВсего товаров: ${cart.length}`);
        }

        const productsData = {
            1: { name: "Товар 1", price: 1000, img: "https://via.placeholder.com/400x250/ff9999?text=1", desc: "Отличный товар" },
            2: { name: "Товар 2", price: 1500, img: "https://via.placeholder.com/400x250/99ff99?text=2", desc: "Надёжная вещь" },
            3: { name: "Товар 3", price: 800, img: "https://via.placeholder.com/400x250/9999ff?text=3", desc: "Стильный дизайн" },
            4: { name: "Товар 4", price: 2000, img: "https://via.placeholder.com/400x250/ffff99?text=4", desc: "Универсальная вещь" },
            5: { name: "Товар 5", price: 1200, img: "https://via.placeholder.com/400x250/ff99ff?text=5", desc: "Хит продаж" },
            6: { name: "Товар 6", price: 3000, img: "https://via.placeholder.com/400x250/99ffff?text=6", desc: "Эксклюзив" },
            7: { name: "Товар 7", price: 500, img: "https://via.placeholder.com/400x250/ffcc99?text=7", desc: "Отличный подарок" },
            8: { name: "Товар 8", price: 4500, img: "https://via.placeholder.com/400x250/99ccff?text=8", desc: "Премиум" },
            9: { name: "Товар 9", price: 2500, img: "https://via.placeholder.com/400x250/ffccff?text=9", desc: "Лимитированная серия" },
            10: { name: "Товар 10", price: 1800, img: "https://via.placeholder.com/400x250/ccffcc?text=10", desc: "Бестселлер" }
        };
        let currentProductId = null;

        function showDetails(id) {
            currentProductId = id;
            const d = productsData[id];
            document.getElementById('modalImg').src = d.img;
            document.getElementById('modalTitle').innerText = d.name;
            document.getElementById('modalPrice').innerText = d.price + ' ₽';
            document.getElementById('modalDesc').innerText = d.desc;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function addFromModal() {
            if (currentProductId) {
                const d = productsData[currentProductId];
                addToCart(d.name, d.price);
                closeModal();
            }
        }
    </script>
</body>

</html>
