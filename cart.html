<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Корзина - оформление заказа</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .cart-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        .total {
            font-size: 24px;
            font-weight: bold;
            text-align: right;
            margin-top: 20px;
        }

        button {
            background: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: blue;
            text-decoration: none;
        }

        .empty-cart {
            text-align: center;
            color: gray;
        }

        /* Форма оформления заказа */
        .order-form {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }

        .order-form h3 {
            margin-bottom: 15px;
        }

        .order-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .pay-btn {
            background: orange;
            width: 100%;
            margin-top: 20px;
            font-size: 18px;
        }

        .pay-btn:hover {
            background: darkorange;
        }
    </style>
</head>

<body>

    <h1>🛒 Моя корзина</h1>

    <div class="cart-container" id="cartContainer">
        <!-- Сюда будет загружаться корзина -->
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="back-link">← Назад в магазин</a>
    </div>

    <script>
        // Загружаем корзину из localStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            saveCart();
            displayCart();
        }

        function displayCart() {
            const container = document.getElementById('cartContainer');

            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart"><h3>Корзина пуста</h3><p>Добавьте товары на главной странице</p></div>';
                return;
            }

            let html = '';
            let total = 0;

            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                total += item.price;
                html += `
                    <div class="cart-item">
                        <div><strong>${item.name}</strong><br>${item.price} ₽</div>
                        <button onclick="removeFromCart(${i})">Удалить</button>
                    </div>
                `;
            }

            html += `
                <div class="total">Итого: ${total} ₽</div>
                
                <div class="order-form">
                    <h3>📋 Данные для заказа</h3>
                    <input type="text" id="customerName" placeholder="Ваше имя" required>
                    <input type="tel" id="customerPhone" placeholder="Телефон" required>
                    <input type="text" id="customerAddress" placeholder="Адрес доставки" required>
                    
                    <button class="pay-btn" onclick="proceedToPayment()">💳 Перейти к оплате</button>
                </div>
            `;

            container.innerHTML = html;
        }

        function proceedToPayment() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();

            if (!name || !phone || !address) {
                alert('❌ Заполните все поля (имя, телефон, адрес)');
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);

            alert(`✅ Заказ оформлен!\n\n👤 Получатель: ${name}\n📞 Телефон: ${phone}\n🏠 Адрес: ${address}\n\n📦 Товаров: ${cart.length}\n💰 Сумма: ${total} ₽\n\nСпасибо за покупку!`);

            // Очищаем корзину и возвращаем в магазин
            cart = [];
            saveCart();
            window.location.href = 'index.html';
        }

        // Отображаем корзину при загрузке страницы
        displayCart();
    </script>

</body>

</html>
